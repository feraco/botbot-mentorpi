camera_configuration:
  front:
    type: "usb"
    serial_number: ""
    parent_frame: "base_link"
    child_frame: "front_camera_link"
    tf:
      x: 0.10        # front edge of chassis
      y: 0.0
      z: 0.10        # top of chassis + camera mount
      roll: 0
      pitch: 0
      yaw: 0
  back:
    type: ""
    serial_number: ""
    parent_frame: "base_link"
    child_frame: "back_camera_link"
    tf:
      x: -0.10
      y: 0.0
      z: 0.10
      roll: 0
      pitch: 0
      yaw: 3.14159
